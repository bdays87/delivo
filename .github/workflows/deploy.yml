name: Deploy

on:
  push:
    branches:
      - main
      - staging

env:
  # Change these to match your VPS directory layout
  LARAVEL_PATH: /var/www/apps/delivo/delivoapi
  NUXT_PATH: /var/www/apps/delivo/delivo
  PM2_APP_NAME: delivo-client
  NODE_VERSION: '22'

jobs:
  # ────────────────────────────────────────────
  # JOB 1: Test
  # ────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── PHP / Laravel ──
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_pgsql, bcmath, json, openssl
          coverage: none

      - name: Install Composer dependencies
        working-directory: ./delivoapi
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Copy Laravel env
        working-directory: ./delivoapi
        run: cp .env.example .env && php artisan key:generate

      - name: Run PHPUnit
        working-directory: ./delivoapi
        run: php artisan test

      # ── Node / Nuxt ──
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: delivo/package-lock.json

      - name: Install Node dependencies
        working-directory: ./delivo
        run: npm ci

      - name: Build Nuxt
        working-directory: ./delivo
        run: npm run build

  # ────────────────────────────────────────────
  # JOB 2a: Deploy Laravel
  # ────────────────────────────────────────────
  deploy-laravel:
    name: Deploy Laravel
    runs-on: ubuntu-latest
    needs: test
    # Run on both branches, but use different env files via the SSH step
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      # Secrets must exist on the GitHub Environment (production or staging), not only repo secrets.
      - name: Verify deploy secrets are set
        run: |
          test -n "$VPS_HOST" || { echo "VPS_HOST is missing on environment ${{ github.ref_name == 'main' && 'production' || 'staging' }}"; exit 1; }
          test -n "$VPS_USER" || { echo "VPS_USER is missing"; exit 1; }
          test -n "$VPS_SSH_KEY" || { echo "VPS_SSH_KEY is missing"; exit 1; }
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy Laravel via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e

            # ── Choose the right directory based on branch ──
            if [ "${{ github.ref_name }}" = "main" ]; then
              APP_DIR="${{ env.LARAVEL_PATH }}"
            else
              APP_DIR="${{ env.LARAVEL_PATH }}-staging"
            fi

            cd "$APP_DIR"

            BRANCH="${{ github.ref_name }}"
            echo ">>> Syncing to origin/$BRANCH..."
            git remote prune origin || true
            git fetch --force --prune origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo ">>> Installing Composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction

            echo ">>> Caching config, routes, and views..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo ">>> Clearing old caches..."
            php artisan cache:clear

            echo ">>> Reloading PHP-FPM..."
            sudo systemctl reload php8.4-fpm

            echo ">>> Laravel deployment complete."

      - name: Laravel health check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PUBLIC_URL: ${{ secrets.VPS_PUBLIC_URL }}
        run: |
          sleep 5
          if [ -n "$VPS_PUBLIC_URL" ]; then
            BASE="${VPS_PUBLIC_URL%/}"
          else
            BASE="https://${VPS_HOST}"
          fi
          URL="https://dev.anixsys.co.zw/api/v1/ping"
          echo "Checking $URL"
          BODY=$(curl -sfS "$URL")
          echo "$BODY"
          echo "$BODY" | jq -e '.status == true and .data.pong == true and .statusCode == 200' >/dev/null
          echo "Laravel health check passed."

  # ────────────────────────────────────────────
  # JOB 2b: Deploy Nuxt
  # ────────────────────────────────────────────
  deploy-nuxt:
    name: Deploy Nuxt
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Verify deploy secrets are set
        run: |
          test -n "$VPS_HOST" || { echo "VPS_HOST is missing on environment ${{ github.ref_name == 'main' && 'production' || 'staging' }}"; exit 1; }
          test -n "$VPS_USER" || { echo "VPS_USER is missing"; exit 1; }
          test -n "$VPS_SSH_KEY" || { echo "VPS_SSH_KEY is missing"; exit 1; }
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy Nuxt via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            /bin/bash -s <<'ENDSSH'
            set -euo pipefail

            NODE_VER="${{ env.NODE_VERSION }}"

            # ── Choose the right directory based on branch ──
            if [ "${{ github.ref_name }}" = "main" ]; then
              APP_DIR="${{ env.NUXT_PATH }}"
              PM2_APP="${{ env.PM2_APP_NAME }}"
            else
              APP_DIR="${{ env.NUXT_PATH }}-staging"
              PM2_APP="${{ env.PM2_APP_NAME }}-staging"
            fi

            cd "$APP_DIR"

            BRANCH="${{ github.ref_name }}"
            echo ">>> Syncing to origin/$BRANCH..."
            git remote prune origin || true
            git fetch --force --prune origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"

            node_major() {
              node -p "process.versions.node.split('.')[0]" 2>/dev/null || echo 0
            }

        

            echo ">>> Installing Node dependencies..."
            npm ci

            echo ">>> Building Nuxt..."
            npm run build
            pm2 restart delivo-client 
            echo ">>> Saving PM2 process list..."
            pm2 save

            echo ">>> Reloading Nginx..."
            sudo nginx -s reload

            echo ">>> Nuxt deployment complete."
            ENDSSH

      - name: Nuxt health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ secrets.VPS_HOST }})
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"  
            exit 1
          fi

  # ────────────────────────────────────────────
  # JOB 3: Notify
  # ────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-laravel, deploy-nuxt]
    if: always()

    steps:
      # secrets cannot be referenced in `if:` — gate via a prior step instead
      - name: Check Slack webhook is configured
        id: slack
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

      - name: Send Slack notification
        if: steps.slack.outputs.enabled == 'true'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ needs.deploy-laravel.result == 'success' && needs.deploy-nuxt.result == 'success' && '✅' || '❌' }} *[${{ github.ref_name }}]* Deployment ${{ needs.deploy-laravel.result == 'success' && needs.deploy-nuxt.result == 'success' && 'succeeded' || 'failed' }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
